version: 2
updates:
  # 前端依赖
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    reviewers:
      - "jonykchen"
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "deps(frontend)"

  # Rust 依赖
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    reviewers:
      - "jonykchen"
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "deps(rust)"
